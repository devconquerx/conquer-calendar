{% load i18n %}
<!--begin::Page title-->
<div class="page-title d-flex flex-column justify-content-center flex-wrap me-3">
	<!--begin::Title-->
	<h1 class="page-heading d-flex text-dark fw-medium fs-3 flex-column justify-content-center my-0">{{ page_title }}</h1>
	<!--end::Title-->
	<!--begin::Breadcrumb-->
	<ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 my-0 pt-1">
    {% for b in breadcrums %}
      <li class="breadcrumb-item text-muted">
        <a class="text-muted text-hover-primary" href="{{ b.url }}">{{ b.title }}</a>
      </li>
      {% if not forloop.last %}
      <li class="breadcrumb-item">
        <span class="bullet bg-gray-400 w-5px h-2px"></span>
      </li>
      {% endif %}
    {% endfor %}
	</ul>
	<!--end::Breadcrumb-->
</div>
<!--end::Page title-->
