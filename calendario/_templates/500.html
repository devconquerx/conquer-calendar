<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500 - Error del Sistema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #212529;
        }
        .container {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 40px;
            max-width: 450px;
            text-align: center;
        }
        .error-code {
            font-size: 72px;
            font-weight: 300;
            color: #6c757d;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #212529;
            color: #fff;
            padding: 10px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .btn:hover {
            background: #343a40;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">500</div>
        <h1>Error del Sistema</h1>
        <p>Ha ocurrido un error inesperado. Por favor, intenta nuevamente más tarde.</p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
</body>
</html>
