{% extends 'layout/panel.html' %}

{% block title %}Eliminar grupo · {% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width:480px;">
    <div class="card-header border-0 pt-6">
        <div class="card-title">
            <h3 class="fw-bold mb-0">Eliminar grupo</h3>
        </div>
    </div>
    <div class="card-body pt-4">
        <div class="alert alert-danger d-flex align-items-center gap-3 p-5 mb-6">
            <i class="bi bi-exclamation-triangle-fill fs-2hx text-danger"></i>
            <div>
                <strong>¿Eliminar el grupo "{{ object.nombre }}"?</strong><br>
                <span class="fs-7">Se quitará a todos los miembros de este grupo. Los usuarios en sí <strong>no se eliminan</strong>.</span>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-danger">Eliminar grupo</button>
                <a href="{% url 'panel_grupos:grupo_list' %}" class="btn btn-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
