{% extends 'layout/panel.html' %}

{% block title %}Eliminar usuario · {% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title mb-0">Eliminar usuario</h3>
    </div>
    <div class="card-body">
        <p>¿Seguro que quieres eliminar al usuario <strong>{{ object.username }}</strong>?</p>
        <p class="text-danger">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'panel_usuarios:usuario_list' %}" class="btn btn-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
