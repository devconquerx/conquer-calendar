{% extends 'layout/panel.html' %}

{% block title %}Cambiar contraseña · {% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title mb-0">
            {% if objeto %}Cambiar contraseña de {{ objeto.username }}{% else %}Cambiar mi contraseña{% endif %}
        </h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'panel_usuarios:usuario_list' %}" class="btn btn-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
