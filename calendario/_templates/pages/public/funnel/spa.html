{% load django_vite %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if funnel %}{{ funnel.nombre }} — {% endif %}Conquer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

  {% include '_includes/_sgtm_head.html' %}

  {% vite_hmr_client %}
  {% vite_react_refresh %}
  {% vite_asset 'src/funnel-spa.jsx' %}
</head>
<body>
  {% include '_includes/_sgtm_body.html' %}
  {{ funnel_config|json_script:"funnel-config" }}
  <div id="funnel-root"
       data-slug="{{ slug }}"
       data-csrf="{{ csrf_token }}"
       data-escuela="{{ escuela }}"
       data-region="{{ region }}"
       data-program="{{ program }}"
       data-stage="{{ stage }}"
       data-video-enabled="{% if video_enabled %}1{% else %}0{% endif %}"
       data-landing-url="{{ landing_url }}"
       data-video-url="{{ video_url }}"
       data-stepform-url="{{ stepform_url }}"
       data-confirmation-url="{{ confirmation_url }}"></div>
</body>
</html>
