{% extends 'layout/public.html' %}
{% block title %}Reserva cancelada — {% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body text-center py-5">
        <h4>Reserva cancelada</h4>
        <p class="text-muted">
          Has cancelado correctamente la reserva de
          <strong>{{ reserva.event_type.nombre }}</strong>
          con {{ reserva.host.first_name|default:reserva.host.username }}.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
