{% extends 'layout/auth.html' %}
{% load i18n %}

{% block title %}Cerrar sesión · {% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center">
        <h4 class="mb-5">¿Cerrar sesión?</h4>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-3">Cerrar sesión</button>
            <a href="/panel/" class="btn btn-light">Cancelar</a>
        </form>
    </div>
</div>
{% endblock content %}
