services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: conquer_calendario_production_django
    restart: unless-stopped
    env_file:
      - /home/conquer-calendar/.env
    command: /start
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./calendario-media:/calendario-media
      - /etc/conquer:/etc/conquer:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: calendar.conquerx.com", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
